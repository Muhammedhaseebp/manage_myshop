{% extends 'base.html' %}
{% block content %}
<h3> Sales Records</h3>
<table class = "table table-striped">

    <tr> 
        <th>Date</th>
        <th>Code</th>
        <th>Product</th>
        <th>Payment</th>
        <th>Amount</th>
        
    </tr>

    {% for sale in sales %}
    <tr>
        <td> {{ sale.date }}</td>
        <td> {{ sale.code }}</td>
        <td> {{ sale.product_name }}</td>
        <td> {{ sale.payment_method }}</td>
        <td> {{ sale.amount }}</td>
        
    </tr>
    {% endfor %}
</table>
{% endblock %}
